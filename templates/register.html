<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockLens - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        .auth-card {
            max-width: 420px;
            margin: 80px auto;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        .auth-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            border-radius: 16px 16px 0 0;
            padding: 24px;
            text-align: center;
        }
        .auth-header i { font-size: 2rem; }
    </style>
</head>
<body>
    <div class="card auth-card">
        <div class="auth-header">
            <i class="bi bi-graph-up-arrow"></i>
            <h4 class="mt-2 mb-0">StockLens</h4>
            <small class="text-white-50">Create a new account</small>
        </div>
        <div class="card-body p-4">
            {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small">Username</label>
                    <input type="text" name="username" class="form-control" value="{{ username|default('') }}" required autofocus>
                    <div class="form-text">At least 3 characters</div>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Password</label>
                    <input type="password" name="password" class="form-control" required>
                    <div class="form-text">At least 6 characters</div>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Confirm Password</label>
                    <input type="password" name="confirm" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-person-plus me-1"></i> Create Account
                </button>
            </form>
            <div class="text-center mt-3">
                <small class="text-muted">Already have an account? <a href="/login">Sign in</a></small>
            </div>
        </div>
    </div>
</body>
</html>
